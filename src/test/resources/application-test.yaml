spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pkfrc_rdv_test
    username: postgres
    password: beroise.
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.pkrfc.rdv_backend: INFO
    org.hibernate.orm.connections.pooling: WARN
    com.zaxxer.hikari: WARN
    org.flywaydb: WARN